name: Rebuild Gallery Site

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build site from Google Sheets
        run: python3 build_site_actions.py

      - name: Commit and push updated site
        run: |
          git config user.name  "Joyce Gallery Bot"
          git config user.email "gallery-bot@noreply.github.com"
          git add index.html galleries/
          git diff --staged --quiet \
            && echo "No changes — skipping commit." \
            || ( git commit -m "Auto-rebuild: update galleries" && git push )

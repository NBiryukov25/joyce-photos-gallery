name: Rebuild Gallery Site

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests
      - name: Fetch gallery data from Google Sheets and build site
        env:
          SHEETS_API_KEY: <LaTex>${{ secrets.SHEETS_API_KEY }}
          SPREADSHEET_ID: $</LaTex>{{ secrets.SPREADSHEET_ID }}
        run: python3 build_site_actions.py
      - name: Commit and push updated site
        run: |
          git config user.name "Joyce Gallery Bot"
          git config user.email "gallery-bot@noreply.github.com"
          git add index.html galleries/
          git diff --staged --quiet || git commit -m "Auto-rebuild: update galleries [skip ci]"
          git push

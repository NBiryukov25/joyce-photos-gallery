<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>· Sheryl Joyce</title>
  <link rel="stylesheet" href="../gallery.css">
  <style>
    body { background: #080503; color: #f2ebe0; }
    .pin-gate { display:flex; flex-direction:column; align-items:center;
                justify-content:center; min-height:80vh; gap:1.2em; }
    .pin-hint  { font-family:'Jost',sans-serif; font-size:0.65em; letter-spacing:0.2em;
                 text-transform:uppercase; color:rgba(242,235,224,0.35); }
    .pin-caption { font-family:'Cormorant Garamond', Georgia, serif; font-size:0.9em;
                   font-weight:300; font-style:italic; line-height:1.6;
                   color:rgba(242,235,224,0.55); max-width:500px; text-align:center; margin-top:1em; }
    .join-button { background:transparent; border:1px solid rgba(242,235,224,0.4);
                   color:#f2ebe0; font-family:'Cormorant Garamond', Georgia, serif;
                   font-size:1.1em; padding:0.8em 2em; cursor:pointer;
                   transition:all 0.3s; letter-spacing:0.05em; }
    .join-button:hover { background:rgba(242,235,224,0.08); border-color:rgba(242,235,224,0.7); }
    .pin-input { background:transparent; border:none; border-bottom:1px solid rgba(242,235,224,0.3);
                 color:#f2ebe0; font-size:1.4em; text-align:center; letter-spacing:0.5em;
                 width:10em; outline:none; padding:0.3em 0; }
    .pin-error { color:rgba(220,120,100,0.8); font-size:0.7em; letter-spacing:0.1em; display:none; }
    .video-section { display:none; max-width:860px; margin:0 auto; padding:3em 1.5em 6em; }
    .video-wrap { position:relative; padding-bottom:56.25%; height:0; overflow:hidden;
                  margin-bottom:2.5em; border-radius:2px; }
    .video-wrap iframe { position:absolute; top:0; left:0; width:100%; height:100%; border:none; }
  </style>
</head>
<body>

  <div class="pin-gate" id="gate">
    <button class="join-button">Join Us</button>
    <p class="pin-caption">You have to guess Joyce's birthday before you enter</p>
    <p class="pin-hint" style="margin-top:2em;">Enter date (MMDD)</p>
    <input class="pin-input" id="pin" type="text" maxlength="4"
           autocomplete="off" placeholder="0000" />
    <p class="pin-error" id="err">Try again</p>
  </div>

  <div class="video-section" id="videos">

    <!-- VIDEO 1 -->
    <div style="margin-bottom:20px;">
  <iframe
    src="https://drive.google.com/file/d/1oEmmZlMfDJCshJTkFaW-lV3aVCCUFdqt/preview"
    width="100%"
    height="480"
    allow="autoplay">
  </iframe>
</div>

<div>
  <iframe
    src="https://drive.google.com/file/d/1sg6NDoUemo9nv_k5NwTvo0CzgTWEpG_e/preview"
    width="100%"
    height="480"
    allow="autoplay">
  </iframe>
</div>
<!-- Add more videos by copying the video-wrap block above -->

  <script>
    const BIRTHDAY = '0926'; // Joyce's birthday in MMDD format
    document.getElementById('pin').addEventListener('input', function () {
      if (this.value === BIRTHDAY) {
        document.getElementById('gate').style.display   = 'none';
        document.getElementById('videos').style.display = 'block';
        document.getElementById('err').style.display    = 'none';
      } else if (this.value.length === BIRTHDAY.length) {
        document.getElementById('err').style.display = 'block';
        this.value = '';
      }
    });
  </script>

</body>
</html>

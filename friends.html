<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sheryl Joyce — Joyce & Friends. Candid moments, shared light.">
  <title>Joyce &amp; Friends · Sheryl Joyce</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="gallery.css">
  <link rel="stylesheet" href="lightbox.css">
  <style>
    .friends-grid {
      columns: 3 200px;
      column-gap: 1rem;
      margin-bottom: 4em;
    }

    .friends-photo {
      width: 100%;
      display: block;
      margin-bottom: 1rem;
      break-inside: avoid;
      border-radius: 2px;
      cursor: zoom-in;
      transition: opacity 0.22s ease;
    }

    .friends-photo:hover {
      opacity: 0.82;
    }

    .friends-empty {
      font-family: 'Jost', sans-serif;
      font-size: 0.75em;
      font-weight: 300;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--text-soft);
      padding: 4em 0;
      text-align: center;
    }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="site-nav">
      <a href="gallery.html" class="nav-brand">Sheryl Joyce</a>
      <nav class="nav-links">
        <a href="gallery.html" class="nav-link">Galleries</a>
        <a href="stories.html" class="nav-link">Stories</a>
        <a href="friends.html" class="nav-link active">Friends</a>
      </nav>
    </div>
  </header>

  <section class="page-hero">
    <p class="page-hero-overline">Collection</p>
    <h1 class="page-hero-title">Joyce &amp; Friends</h1>
    <p class="page-hero-subtitle">Candid moments &nbsp;·&nbsp; Shared light</p>
  </section>

  <hr class="gallery-divider">

  <div class="stories-section-label">All Photos</div>

  <div class="photo-grid" id="friends-grid"></div>

  <script>
    var filenames = [
        'photo-20260612-023428.jpg',
      ];

    var folder = 'assets/Joyce-and-Friends/';

    (function () {
      var grid = document.getElementById('friends-grid');

      if (!filenames.length) {
        var empty = document.createElement('p');
        empty.className = 'friends-empty';
        empty.textContent = 'No photos yet.';
        grid.appendChild(empty);
        return;
      }

      filenames.forEach(function (name) {
        var img = document.createElement('img');
        img.src = folder + encodeURIComponent(name);
        img.alt = 'Joyce & Friends';
        img.className = 'friends-photo';
        grid.appendChild(img);
      });
    })();
  </script>

  <script src="lightbox.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Story Formatter · Sheryl Joyce</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Georgia', serif;
      background: #faf7f4;
      color: #1f1a18;
      padding: 2em;
      max-width: 860px;
      margin: 0 auto;
    }
    h1 { font-size: 1.4em; font-weight: 400; margin-bottom: 0.3em; }
    p.sub { font-size: 0.85em; color: #7a6b66; margin-bottom: 1.8em; }
    label { display: block; font-size: 0.8em; letter-spacing: 0.1em; text-transform: uppercase; color: #a87060; margin-bottom: 0.5em; }
    textarea {
      width: 100%;
      height: 280px;
      padding: 1em;
      font-family: Georgia, serif;
      font-size: 0.95em;
      line-height: 1.7;
      border: 1px solid #ddd0ca;
      border-radius: 4px;
      background: #fff;
      resize: vertical;
    }
    .btn {
      display: inline-block;
      margin: 1em 0.5em 1em 0;
      padding: 0.65em 1.6em;
      background: #a87060;
      color: #fff;
      border: none;
      border-radius: 3px;
      font-size: 0.82em;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
    }
    .btn:hover { background: #7d5245; }
    .btn.secondary { background: #e0ccc6; color: #1f1a18; }
    .btn.secondary:hover { background: #c9b0a8; }
    #output-wrap { display: none; margin-top: 1.5em; }
    #output {
      width: 100%;
      height: 280px;
      padding: 1em;
      font-family: monospace;
      font-size: 0.82em;
      line-height: 1.6;
      border: 1px solid #ddd0ca;
      border-radius: 4px;
      background: #f5ece8;
      resize: vertical;
    }
    .copied { color: #a87060; font-size: 0.8em; margin-left: 0.5em; display: none; }
  </style>
</head>
<body>
  <h1>Story Formatter</h1>
  <p class="sub">Paste your plain text below. Each blank line becomes a paragraph break. Click Convert, then copy the result into your story HTML file.</p>

  <label for="input">Your text</label>
  <textarea id="input" placeholder="Paste your story text here…"></textarea>

  <div>
    <button class="btn" onclick="convert()">Convert →</button>
    <button class="btn secondary" onclick="clearAll()">Clear</button>
  </div>

  <div id="output-wrap">
    <label for="output">HTML output — copy this into your story file</label>
    <textarea id="output" readonly></textarea>
    <div>
      <button class="btn" onclick="copyOutput()">Copy to clipboard</button>
      <span class="copied" id="copied-msg">Copied!</span>
    </div>
  </div>

  <script>
    function convert() {
      const raw = document.getElementById('input').value;
      const paragraphs = raw
        .split(/\n{2,}/)
        .map(p => p.trim().replace(/\n/g, ' '))
        .filter(p => p.length > 0)
        .map(p => '<p>' + p + '</p>')
        .join('\n\n');
      document.getElementById('output').value = paragraphs;
      document.getElementById('output-wrap').style.display = 'block';
    }

    function copyOutput() {
      const out = document.getElementById('output');
      out.select();
      document.execCommand('copy');
      const msg = document.getElementById('copied-msg');
      msg.style.display = 'inline';
      setTimeout(() => { msg.style.display = 'none'; }, 2000);
    }

    function clearAll() {
      document.getElementById('input').value = '';
      document.getElementById('output').value = '';
      document.getElementById('output-wrap').style.display = 'none';
    }
  </script>
</body>
</html>

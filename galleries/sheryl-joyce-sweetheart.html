    .masonry-gallery {
      column-count: 3;
      column-gap: 14px;
      padding: 0 1.5rem 4rem;
      max-width: 1200px;
      margin: 0 auto;
    }
    .masonry-gallery .bento-item {
      break-inside: avoid;
      margin-bottom: 14px;
      border-radius: 5px;
      overflow: hidden;
      cursor: zoom-in;
      display: block;
    }
    .masonry-gallery .bento-item img {
      width: 100%;
      display: block;
      border-radius: 5px;
      transition: opacity 0.25s ease, transform 0.25s ease;
    }
    .masonry-gallery .bento-item:hover img {
      opacity: 0.88;
      transform: scale(1.02);
    }
    .masonry-gallery figcaption { display: none; }

    @media (max-width: 720px) { .masonry-gallery { column-count: 2; } }
    @media (max-width: 420px) { .masonry-gallery { column-count: 1; } }
  </style>

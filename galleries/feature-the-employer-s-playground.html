  <script>
    (function () {
      var stage=document.getElementById('fp-stage'),barEl=document.getElementById('fp-bar'),dotsWrap=document.getElementById('fp-dots');
      var slides=Array.prototype.slice.call(stage.querySelectorAll('.fp-slide')),N=slides.length,INTERVAL=parseInt(stage.getAttribute('data-interval'),10)||8000,cur=0,timer=null;
      if(N===0)return;
      slides.forEach(function(_,i){var b=document.createElement('button');b.className='fp-dot'+(i===0?' active':'');b.setAttribute('aria-label','Slide '+(i+1));b.addEventListener('click',function(){stop();show(i);start();});dotsWrap.appendChild(b);});
      var dots=dotsWrap.querySelectorAll('.fp-dot');
      function resetBar(){barEl.style.transition='none';barEl.style.width='0%';requestAnimationFrame(function(){requestAnimationFrame(function(){barEl.style.transition='width '+INTERVAL+'ms linear';barEl.style.width='100%';});});}
      function show(n){slides[cur].classList.remove('active');if(dots[cur])dots[cur].classList.remove('active');cur=(n+N)%N;slides[cur].classList.add('active');if(dots[cur])dots[cur].classList.add('active');resetBar();}
      function start(){if(!timer&&N>1)timer=setInterval(function(){show(cur+1);},INTERVAL);}
      function stop(){clearInterval(timer);timer=null;}
      document.addEventListener('keydown',function(e){if(e.key==='ArrowRight'){stop();show(cur+1);start();}if(e.key==='ArrowLeft'){stop();show(cur-1);start();}});
      show(0);start();
    })();
  </script>

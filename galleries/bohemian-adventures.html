<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bohemian Adventures · Sheryl Joyce</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../gallery.css">
  <link rel="stylesheet" href="../lightbox.css">
</head>
<body>
  <header class="site-header">
    <div class="site-nav">
      <a href="../gallery.html" class="nav-brand">Sheryl Joyce</a>
      <nav class="nav-links">
        <a href="../gallery.html" class="nav-link active">Galleries</a>
        <a href="../stories.html" class="nav-link">Stories</a>
      </nav>
    </div>
  </header>
  <a class="back-link" href="../gallery.html">← Back to Galleries</a>
  <h1 class="portfolio-title">Bohemian Adventures</h1>
  <div class="portfolio-subtitle">Series I — Light &amp; Form</div>
  <p class="portfolio-caption">Free-spirited moments in natural light.</p>
  <p class="portfolio-meta">Digital, 2024 · Natural Light</p>
  <hr class="portfolio-divider">

  <div class="photo-grid masonry" id="photo-grid">
    <p class="empty-notice">Loading photos…</p>
  </div>

  <script>
    (function () {
      // Optimized WebP (max 1600px, q82) built by tools/optimize_gallery_images.py.
      // Originals kept in the same folder as masters. ~17 MB -> ~1.6 MB.
      var filenames = [
        '2025-10-17 17.55.55.webp',
        '2025-10-17 18.01.58.webp',
        '2025-10-17 18.04.47.webp',
        '2025-10-17 18.07.48.webp',
        '2025-10-17 18.09.51.webp',
        '2025-10-17 18.12.01.webp',
        '2025-10-17 18.13.46.webp',
        '2025-10-17 18.19.18.webp',
        '2025-10-18 02.20.14.webp',
        '2025-10-18 02.27.41.webp',
        '2025-10-18 02.27.58.webp',
        '2025-10-18 02.29.53.webp',
        '2025-10-18 02.36.40.webp'
      ];

      var captions = [
        'Late afternoon, no agenda. She moves through the world like she wrote the rules and then decided not to follow them.',
        'The light is soft and she\'s softer. Nothing about this moment is rushed.',
        'She laughs at something private. You\'ll spend the rest of the evening trying to earn the explanation.',
        'She doesn\'t pose. She just exists beautifully and lets the camera catch up.',
        'Natural light does what no studio can — tells the truth about how beautiful she actually is.',
        'She looks back the way she looks at everything — like it might be worth keeping.',
        'The afternoon stretches long and golden and she matches it perfectly — unhurried, warm, entirely at ease.',
        'A candid moment between moments. These are the ones you can\'t plan — you can only be present enough to catch them.',
        'The light is lower now, gentler. She hasn\'t changed — the world just softened to match her.',
        'The adventure shifts indoors. Same light in her eyes, different walls around her.',
        'She settles in for the evening with that easy confidence she carries everywhere — like any room she enters becomes hers.',
        'The night is young and so is every feeling in this room. She looks at you like she\'s decided to stay a little longer.',
        'End of the adventure. She\'s already composing the next one in her head — and you\'re already hoping you\'re in it.'
      ];

      var roman = ['I','II','III','IV','V','VI','VII','VIII','IX','X','XI','XII','XIII'];

      var grid = document.getElementById('photo-grid');
      grid.innerHTML = '';

      filenames.forEach(function (filename, index) {
        var item = document.createElement('div');
        item.className = 'photo-item';

        var img = document.createElement('img');
        img.src = '../assets/Bohemian-Adventures/' + encodeURIComponent(filename);
        img.alt = 'Bohemian Adventures ' + (roman[index] || (index + 1));

        var info = document.createElement('div');
        info.className = 'photo-info';
        info.innerHTML = '<p class="photo-title">' + (roman[index] || (index + 1)) + '</p>' +
          '<p class="photo-caption">' + captions[index] + '</p>';

        item.appendChild(img);
        item.appendChild(info);
        grid.appendChild(item);
      });
    })();
  </script>
  <script src="../lightbox.js"></script>
</body>
</html>

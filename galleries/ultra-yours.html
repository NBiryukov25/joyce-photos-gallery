<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ultra Yours · Sheryl Joyce</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #060404; overflow: hidden; }

    .shell {
      position: relative;
      width: 100vw; height: 100vh; height: 100dvh;
      background: #060404;
      overflow: hidden;
    }

    .slide {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      opacity: 0;
      transition: opacity 0.6s ease;
    }
    .slide.active { opacity: 1; }
    .slide img {
      max-width: 100%; max-height: 100%;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }
    .slide video {
      max-width: 100%; max-height: 100%;
      display: block;
    }

    .top-ui {
      position: absolute; top: 0; left: 0; right: 0; z-index: 10;
      padding: 1.6rem 2.5rem 4rem;
      background: linear-gradient(to bottom, rgba(6,4,4,0.72) 0%, transparent 100%);
      pointer-events: none;
    }
    .gallery-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.78rem; font-weight: 300;
      letter-spacing: 0.32em; text-transform: uppercase;
      color: rgba(247,241,238,0.48);
    }

    .bottom-ui {
      position: absolute; bottom: 0; left: 0; right: 0; z-index: 10;
      padding: 4rem 3rem 1.4rem;
      background: linear-gradient(to top, rgba(6,4,4,0.78) 0%, transparent 100%);
      display: flex; flex-direction: column; align-items: center; gap: 0.6rem;
      pointer-events: none;
    }
    .caption-el {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.9rem; font-weight: 300; font-style: italic;
      color: rgba(247,241,238,0.68);
      letter-spacing: 0.04em; text-align: center;
      max-width: 520px; line-height: 1.55;
    }
    .counter-el {
      font-family: 'Jost', sans-serif;
      font-size: 0.6rem; font-weight: 200;
      letter-spacing: 0.26em;
      color: rgba(247,241,238,0.26);
    }

    .edge-control {
      position: absolute; top: 50%; z-index: 20;
      width: 30px; height: 96px; padding: 0;
      border: 0; background: transparent;
      transform: translateY(-50%); cursor: pointer;
    }
    .edge-control-left  { left: 0; }
    .edge-control-right { right: 0; }
    .edge-control svg {
      width: 14px; height: 48px;
      fill: none;
      stroke: rgba(255,255,255,0.38);
      stroke-width: 1;
      stroke-linecap: round; stroke-linejoin: round;
      transition: stroke 0.2s ease;
    }
    .edge-control:hover svg { stroke: rgba(255,255,255,0.92); }

    .topbar-controls {
      position: absolute; top: 1.3rem; right: 1.3rem; z-index: 20;
      display: flex; align-items: center; gap: 0.4rem;
    }
    .ui-btn {
      appearance: none;
      border: 1px solid rgba(255,255,255,0.16); border-radius: 999px;
      background: rgba(6,4,4,0.45);
      color: rgba(247,241,238,0.48);
      padding: 0.26rem 0.62rem;
      font-family: 'Jost', sans-serif; font-size: 0.6rem; font-weight: 300;
      letter-spacing: 0.16em; text-transform: uppercase;
      cursor: pointer; text-decoration: none; display: inline-block;
      transition: color 0.2s, border-color 0.2s;
      white-space: nowrap;
    }
    .ui-btn:hover {
      color: rgba(247,241,238,0.9);
      border-color: rgba(255,255,255,0.4);
    }

    @media (max-width: 600px) {
      .gallery-title { font-size: 0.7rem; }
      .caption-el    { font-size: 0.82rem; }
      .topbar-controls { top: 0.9rem; right: 0.9rem; }
      .ui-btn { font-size: 0.56rem; padding: 0.22rem 0.5rem; }
    }
  </style>
</head>
<body>
<audio id="bg-audio" src="../assets/audio/ReverJ_01.mp3" loop preload="auto"></audio>
<div class="shell" id="shell">

  <div class="top-ui">
    <div class="gallery-title">Ultra Yours</div>
  </div>

  <div class="bottom-ui">
    <div class="caption-el" id="caption-el"></div>
    <div class="counter-el" id="counter-el"></div>
  </div>

  <button class="edge-control edge-control-left" id="prev-btn" aria-label="Previous photograph">
    <svg viewBox="0 0 24 48" aria-hidden="true"><path d="M18 3 L5 24 L18 45"/></svg>
  </button>

  <button class="edge-control edge-control-right" id="next-btn" aria-label="Next photograph">
    <svg viewBox="0 0 24 48" aria-hidden="true"><path d="M6 3 L19 24 L6 45"/></svg>
  </button>

  <div class="topbar-controls">
    <button class="ui-btn" id="autoplay-btn">Auto ★</button>
    <button class="ui-btn" id="fs-btn">Fullscreen</button>
    <a    class="ui-btn" href="../joyce-ultra.html">← Ultra</a>
  </div>

</div>

<script>
(function () {

  var slides = [
    { filename: 'photo-20260709-052157.jpg',    focalX: 50, focalY: 42, zoomEnd: 1.25, caption: 'Sinasamba kita   Ikaw ang aking diyos   Kunin mo ako   Kunin mo ako nang buo   Wala na akong ibang Diyos   Ako\'y sa iyo    —-I worship you You are my god   Take me Take me whole. I have no other God. I am yours' },
    { filename: 'photo-20260712-233125-01.jpg',  focalX: 52, focalY: 44, zoomEnd: 1.27, caption: '' },
    { filename: 'photo-20260712-233122.jpg',     focalX: 48, focalY: 40, zoomEnd: 1.25, caption: '' },
    { filename: 'photo-20260709-052749.jpg',     focalX: 50, focalY: 45, zoomEnd: 1.28, caption: 'It started with curiosity, not rebellion. Joyce never imagined she\'d trade her quiet evenings for the thrill of surrender. But the moment she let go of control, something else woke up inside her.' },
    { filename: 'photo-20260709-151115.jpg',     focalX: 53, focalY: 42, zoomEnd: 1.25, caption: '' },
    { filename: 'photo-20260709-151118-01.jpg',  focalX: 47, focalY: 44, zoomEnd: 1.26, caption: '' },
    { filename: 'photo-20260710-023440.jpg',     focalX: 50, focalY: 43, zoomEnd: 1.25, caption: '' },
    { filename: 'photo-20260710-023443-01.jpg',  focalX: 51, focalY: 45, zoomEnd: 1.27, caption: '' },
    { filename: 'photo-20260709-154204.jpg',     focalX: 49, focalY: 41, zoomEnd: 1.25, caption: '' },
    { filename: 'photo-20260709-154208-01.jpg',  focalX: 52, focalY: 43, zoomEnd: 1.28, caption: 'She never thought she\'d be here—sitting on a bed in lace, hands raised, letting someone else decide when to touch her. The divorce papers from Hong Kong never came through. She\'s still technically married to a man in the Philippines who never saw her like this. But this man? He doesn\'t care about certificates or visas. He just cares about the way she arches when he touches her.' },
    { filename: 'photo-20260709-154215-03.jpg',  focalX: 50, focalY: 42, zoomEnd: 1.30, caption: 'She should be faithful. She should be loyal. But loyalty died somewhere between the church vows and the broken promise of love. Now she\'s here, legs open, surrendering to the one thing she never knew she was starving for.' },
    { filename: 'photo-20260709-154807.jpg',     focalX: 48, focalY: 44, zoomEnd: 1.25, caption: 'Married to a man who never touched her the way she needed. Engaged to one who didn\'t understand her at all. And now this stranger found the exact place she never let anyone see—where she breaks without trying.' },
    { filename: 'photo-20260709-183722.jpg',     focalX: 50, focalY: 40, zoomEnd: 1.27, caption: 'From the Filipino husband who never touched her properly, to the fianc\xe9 who left before he ever really knew her. This man found her before she could hide. He didn\'t ask for permission. He didn\'t pretend to respect boundaries she\'d built to survive. He just saw her—the real her. And for the first time, Joyce didn\'t fight it.' },
    { filename: 'photo-20260709-184929.jpg',     focalX: 53, focalY: 45, zoomEnd: 1.25, caption: 'She filed for a divorce in Hong Kong and applied for a K-1 visa, trying to leave her Filipino husband behind legally, but the truth is she was already gone. She had never experienced a man like him—never known the size or the stretch that would completely own her body. She’s still married to someone else, paperwork pending, but in his arms, she’s found the only thing that makes her forget the rules she used to follow.' },
    { filename: 'photo-20260710-035323.jpg',     focalX: 47, focalY: 42, zoomEnd: 1.26, caption: '' },
    { filename: 'photo-20260710-035327-01.jpg',  focalX: 50, focalY: 44, zoomEnd: 1.25, caption: '' },
    { filename: 'photo-20260710-201732.jpg',     focalX: 50, focalY: 42, zoomEnd: 1.30, caption: 'Article 333 of the Revised Penal Code. Adultery is a crime in the Philippines. But Joyce stopped reading the law books the day she stopped looking at her husband like a partner. Now she\'s kneeling on a bed in Hong Kong, bending over backwards for a man who knows she\'s already broken the rules of her marriage. The only question is whether she\'ll end up in prison or in his arms.' },
  ];

  var BASE        = '../assets/Ultra-Yours/';
  var VIDEO_EXTS  = ['mp4', 'mov', 'webm', 'm4v'];
  var ZOOM_MS     = 7000;
  var AUTOPLAY_MS = 7000;

  var shell       = document.getElementById('shell');
  var captionEl   = document.getElementById('caption-el');
  var counterEl   = document.getElementById('counter-el');
  var prevBtn     = document.getElementById('prev-btn');
  var nextBtn     = document.getElementById('next-btn');
  var autoBtn     = document.getElementById('autoplay-btn');
  var fsBtn       = document.getElementById('fs-btn');
  var bgAudio     = document.getElementById('bg-audio');

  var current     = 0;
  var autoTimer   = null;
  var slideEls    = [];
  var mediaEls    = [];
  var activeAnim  = null;

  var bottomUI = document.querySelector('.bottom-ui');
  slides.forEach(function (s, i) {
    var div = document.createElement('div');
    div.className = 'slide';
    var ext     = s.filename.split('.').pop().toLowerCase();
    var isVideo = VIDEO_EXTS.indexOf(ext) !== -1;
    var el;
    if (isVideo) {
      el          = document.createElement('video');
      el.src      = BASE + encodeURIComponent(s.filename);
      el.loop     = true; el.muted = true; el.playsInline = true;
    } else {
      el          = document.createElement('img');
      el.src      = BASE + encodeURIComponent(s.filename);
      el.alt      = 'Ultra Yours — ' + (i + 1);
      el.draggable = false;
    }
    div.appendChild(el);
    shell.insertBefore(div, bottomUI);
    slideEls.push(div); mediaEls.push(el);
  });

  function startZoom(i) {
    var el = mediaEls[i];
    var s  = slides[i];
    if (!el || el.tagName === 'VIDEO') return;
    if (activeAnim) { try { activeAnim.cancel(); } catch (e) {} activeAnim = null; }
    el.style.transform       = '';
    el.style.transformOrigin = s.focalX + '% ' + s.focalY + '%';
    activeAnim = el.animate(
      [{ transform: 'scale(1)' }, { transform: 'scale(' + s.zoomEnd + ')' }],
      { duration: ZOOM_MS, easing: 'ease-in-out', fill: 'forwards' }
    );
  }

  function resetMedia(i) {
    var el = mediaEls[i];
    if (!el) return;
    if (el.tagName === 'VIDEO') { try { el.pause(); el.currentTime = 0; } catch (e) {} }
    el.style.transform = '';
  }

  function goTo(n) {
    var old = current;
    current = ((n % slides.length) + slides.length) % slides.length;
    slideEls[old].classList.remove('active');
    resetMedia(old);
    slideEls[current].classList.add('active');
    startZoom(current);
    var cap = slides[current].caption || '';
    captionEl.textContent   = cap;
    captionEl.style.display = cap ? '' : 'none';
    counterEl.textContent   = (current + 1) + ' / ' + slides.length;
    var vid = mediaEls[current];
    if (vid && vid.tagName === 'VIDEO') { try { vid.play(); } catch (e) {} }
  }

  function nudge(dir) {
    goTo(current + dir);
    if (autoTimer) { stopAuto(); startAuto(); }
  }

  prevBtn.addEventListener('click', function () { nudge(-1); });
  nextBtn.addEventListener('click', function () { nudge(1); });

  function startAuto() {
    if (autoTimer) return;
    autoTimer = setInterval(function () { goTo(current + 1); }, AUTOPLAY_MS);
    autoBtn.textContent = 'Pause ★';
    try { bgAudio.play(); } catch (e) {}
  }
  function stopAuto() {
    clearInterval(autoTimer); autoTimer = null;
    autoBtn.textContent = 'Auto ★';
    try { bgAudio.pause(); bgAudio.currentTime = 0; } catch (e) {}
  }
  autoBtn.addEventListener('click', function () { autoTimer ? stopAuto() : startAuto(); });

  function toggleFS() {
    if (document.fullscreenElement) { document.exitFullscreen(); }
    else { (shell.requestFullscreen || shell.webkitRequestFullscreen).call(shell); }
  }
  fsBtn.addEventListener('click', toggleFS);
  document.addEventListener('fullscreenchange', function () {
    fsBtn.textContent = document.fullscreenElement ? 'Exit' : 'Fullscreen';
  });

  window.addEventListener('keydown', function (e) {
    if (e.key === 'ArrowLeft')               { nudge(-1); }
    else if (e.key === 'ArrowRight')         { nudge(1); }
    else if (e.key === 'f' || e.key === 'F') { toggleFS(); }
    else if (e.key === ' ')                  { e.preventDefault(); autoTimer ? stopAuto() : startAuto(); }
  });

  var tx = null;
  shell.addEventListener('touchstart', function (e) { tx = e.touches[0].clientX; }, { passive: true });
  shell.addEventListener('touchend',   function (e) {
    if (tx === null) return;
    var dx = e.changedTouches[0].clientX - tx;
    if (Math.abs(dx) > 44) nudge(dx < 0 ? 1 : -1);
    tx = null;
  }, { passive: true });

  goTo(0);

})();
</script>
</body>
</html>

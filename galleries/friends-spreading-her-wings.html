<body>
  <header class="site-header">
    <div class="site-nav">
      <a href="../gallery.html" class="nav-brand">Sheryl Joyce</a>

  <h1 class="portfolio-title">Spreading Her Wings</h1>
  <div class="portfolio-subtitle">Friends · Joyce & Nicole</div>
  <p class="portfolio-caption">International lovers. Raw and unapologetic.</p>
  <p class="portfolio-meta">Digital, 2026 · Available Light</p>

  <hr class="portfolio-divider">

  <div class="photo-grid masonry" id="photo-grid">
    <p class="empty-notice">Loading photos…</p>
  </div>

  <script>
    (function () {
      var filenames = [
        'photo-20260612-023428.jpg',
        'photo-20260612-024353.jpg',
        'photo-20260612-025035.jpg',
        'photo-20260612-025107.jpg',
        'photo-20260612-173834.jpg',
        'photo-20260612-220452.jpg',
        'photo-20260612-220710.jpg',
        'photo-20260612-220920.jpg',
        'photo-20260612-221311.jpg',
        'photo-20260612-221356.jpg',
        'photo-20260612-221655.jpg',
        'photo-20260612-222047.jpg',
        'photo-20260612-222120.jpg',
        'photo-20260612-222146.jpg',
        'photo-20260612-222345.jpg',
        'photo-20260612-222431.jpg',
        'photo-20260612-222643.jpg',
        'photo-20260612-222701.jpg',
        'photo-20260612-222730.jpg',
        'photo-20260612-223930.jpg',
        'photo-20260612-224003.jpg',
        'photo-20260612-224057.jpg'
      ];

      var roman = [
        'I','II','III','IV','V','VI','VII','VIII','IX','X',
        'XI','XII','XIII','XIV','XV','XVI','XVII','XVIII','XIX','XX',
        'XXI','XXII'
      ];

      var grid = document.getElementById('photo-grid');
      grid.innerHTML = '';

      filenames.forEach(function (filename, index) {
        var item = document.createElement('div');
        item.className = 'photo-item';

        var img = document.createElement('img');
        img.src = '../assets/Joyce-and-Friends/' + filename;
        img.alt = 'Spreading Her Wings ' + (roman[index] || (index + 1));

        var info = document.createElement('div');
        info.className = 'photo-info';
        info.innerHTML = '<p class="photo-title">' + (roman[index] || (index + 1)) + '</p>';

        item.appendChild(img);
        item.appendChild(info);
        grid.appendChild(item);
      });
    })();
  </script>

  <script src="../lightbox.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Joyce's Journey: Embracing New Beginnings — the world of Sheryl Joyce">
  <title>Sheryl Joyce</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Jost', sans-serif;
      background: #0e0b0a;
    }

    /* ── FULL-SCREEN COVER ── */
    .cover {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2em;
    }

    .cover-bg {
      position: absolute;
      inset: 0;
      background-image: url('https://drive.google.com/thumbnail?id=1LxFiZeMyP0LZ9BUVGkw0Uhq6Qt887Skj&sz=w4000');
      background-size: contain;
      background-position: center center;
      background-repeat: no-repeat;
      animation: slowZoom 18s ease-out forwards;
    }

    @keyframes slowZoom {
      from { transform: scale(1.06); }
      to   { transform: scale(1); }
    }

    .cover-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(10, 7, 6, 0.28) 0%,
        rgba(10, 7, 6, 0.52) 60%,
        rgba(10, 7, 6, 0.72) 100%
      );
    }

    /* ── CONTENT ── */
    .cover-content {
      position: relative;
      z-index: 2;
      animation: fadeUp 1.6s ease both;
      animation-delay: 0.4s;
      max-width: 680px;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .cover-overline {
      font-family: 'Jost', sans-serif;
      font-size: 0.62em;
      font-weight: 300;
      letter-spacing: 0.46em;
      text-transform: uppercase;
      color: rgba(234, 200, 185, 0.75);
      margin-bottom: 1.4em;
    }

    .cover-title {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(2.4em, 6vw, 4.4em);
      font-weight: 300;
      font-style: italic;
      line-height: 1.18;
      letter-spacing: 0.03em;
      color: #faf7f4;
      margin-bottom: 0.55em;
    }

    .cover-title span {
      display: block;
      font-style: normal;
      font-weight: 300;
      font-size: 0.46em;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(234, 200, 185, 0.85);
      margin-bottom: 0.6em;
    }

    .cover-tagline {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(1em, 2.4vw, 1.25em);
      font-weight: 300;
      font-style: italic;
      color: rgba(250, 247, 244, 0.65);
      margin-bottom: 3em;
      line-height: 1.6;
    }

    .cover-enter {
      display: inline-block;
      font-family: 'Jost', sans-serif;
      font-size: 0.66em;
      font-weight: 300;
      letter-spacing: 0.38em;
      text-transform: uppercase;
      color: #faf7f4;
      text-decoration: none;
      padding-bottom: 6px;
      border-bottom: 1px solid rgba(250, 247, 244, 0.4);
      transition: color 0.3s, border-color 0.3s, letter-spacing 0.3s;
    }

    .cover-enter:hover {
      color: #e8c8b8;
      border-bottom-color: rgba(232, 200, 184, 0.7);
      letter-spacing: 0.48em;
    }

    /* ── BOTTOM CREDIT ── */
    .cover-credit {
      position: fixed;
      bottom: 1.8em;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      font-family: 'Jost', sans-serif;
      font-size: 0.58em;
      font-weight: 200;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(250, 247, 244, 0.3);
      animation: fadeUp 1.6s ease both;
      animation-delay: 1.2s;
      white-space: nowrap;
    }
  </style>
</head>
<body>

  <div class="cover">
    <div class="cover-bg"></div>
    <div class="cover-overlay"></div>

    <div class="cover-content">
      <p class="cover-overline">Welcome to her world</p>
      <h1 class="cover-title">
        <span>Joyce's Journey</span>
        Embracing New<br>Beginnings
      </h1>
      <p class="cover-tagline">A life in light — every chapter, every image,<br>every quiet moment she dared to claim.</p>
      <a class="cover-enter" href="gallery.html">Enter &nbsp;→</a>
    </div>
  </div>

  <p class="cover-credit">Sheryl Joyce &nbsp;·&nbsp; Vol. I</p>

</body>
</html>
